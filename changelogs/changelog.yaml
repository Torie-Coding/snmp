ancestor: null
releases:
  1.0.0:
    changes:
      minor_changes:
      - snmp_facts - new module for gathering SNMP facts from network devices using
        native PySNMP. Supports SNMPv2c and SNMPv3 (authNoPriv, authPriv) with configurable
        authentication and privacy protocols.
      - snmp_get - new module for targeted SNMP GET requests. Queries one or more
        explicit OIDs and returns raw results as a list and as a dictionary keyed
        by OID.
      - snmp_walk - new module for SNMP subtree walking. Uses GETBULK with configurable
        maxRepetitions and a safety-cap (max_results) to prevent runaway walks on
        large tables.
    fragments:
    - add-snmp-get-walk.yaml
    - initial-release.yaml
    release_date: '2026-03-31'
  1.0.1:
    changes:
      minor_changes:
      - replace the deprecated Python dependency `pysnmp-lextudio` with `pysnmp>=6.2.0,<7.0.0`
        across CI, development dependencies, documentation, and runtime guidance.
    fragments:
    - switch-to-pysnmp.yaml
    release_date: '2026-03-31'
