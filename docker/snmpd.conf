# Minimal net-snmp snmpd configuration for testing.
# Provides SNMPv2c (community "public") and SNMPv3 users (created at image build time).

# --- SNMPv2c ---
rocommunity public default

# --- Agent settings ---
agentAddress udp:161
sysLocation  Test Lab
sysContact   test@example.com
sysName      snmp-test-agent

# --- Views (allow read access to the full MIB tree) ---
view all included .1

# --- SNMPv3 access control ---
# Users are created via net-snmp-create-v3-user at Docker build time.
# Grant read access to the full MIB tree for both users.
rouser testuser priv -V all
rouser testuser256 priv -V all
